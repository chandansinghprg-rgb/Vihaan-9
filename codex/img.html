<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralForge | AI Image Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .error-glitch {
            text-shadow: 2px 0 red, -2px 0 cyan;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0)
            }

            20% {
                transform: translate(-2px, 2px)
            }

            40% {
                transform: translate(-2px, -2px)
            }

            60% {
                transform: translate(2px, 2px)
            }

            80% {
                transform: translate(2px, -2px)
            }

            100% {
                transform: translate(0)
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-2xl w-full space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-4xl font-bold tracking-tighter text-[#bcff00]">NeuralForge <span
                    class="text-white">v5.0</span></h1>
            <p class="font-mono text-xs text-white/50 uppercase tracking-widest">Text-to-Image Generation Engine</p>
        </div>

        <div class="glass-panel rounded-2xl p-8 space-y-6">

            <div class="space-y-2">
                <label class="font-mono text-[10px] text-white/40 uppercase tracking-widest">Hugging Face API Key
                    (Free)</label>
                <input type="password" id="hf-api-key"
                    class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-[#bcff00] transition-colors"
                    placeholder="hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
            </div>

            <div class="space-y-2">
                <label class="font-mono text-[10px] text-white/40 uppercase tracking-widest">Generation Prompt</label>
                <textarea id="prompt-input"
                    class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-[#bcff00] transition-colors"
                    rows="3"
                    placeholder="A futuristic cyberpunk city in the rain, neon lights, highly detailed..."></textarea>
            </div>

            <button id="generate-btn" onclick="generateImage()"
                class="w-full py-4 bg-[#bcff00] text-black font-bold font-mono uppercase tracking-widest rounded-xl hover:bg-white transition-colors disabled:opacity-50">
                Execute Generation
            </button>

            <div id="success-msg" class="hidden mt-6 text-center space-y-4">
                <div class="w-full h-80 rounded-xl overflow-hidden relative border border-white/10">
                    <img id="result-img" class="w-full h-full object-contain bg-black" alt="AI Generated Image">
                    <div
                        class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 to-transparent p-4 text-left">
                        <span class="font-mono text-[10px] text-[#bcff00] uppercase tracking-widest">AI Generated
                            Output</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function generateImage() {
            const apiKey = document.getElementById('hf-api-key').value.trim();
            const prompt = document.getElementById('prompt-input').value.trim();
            const btn = document.getElementById('generate-btn');

            if (!apiKey) return alert('Please enter your Hugging Face API Key.');
            if (!prompt) return alert('Please enter a generation prompt.');

            // Update UI to show loading state
            btn.disabled = true;
            btn.textContent = 'SYNTHESIZING IMAGE... (This may take a moment)';
            document.getElementById('success-msg').classList.add('hidden');

            try {
                // Call the Hugging Face Inference API (using Stable Diffusion)
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0",
                    {
                        headers: {
                            "Authorization": `Bearer ${apiKey}`,
                            "Content-Type": "application/json",
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} - Model might be loading, try again in 10 seconds.`);
                }

                // Convert the response to an image blob
                const imageBlob = await response.blob();
                const imageUrl = URL.createObjectURL(imageBlob);

                // Display the image
                document.getElementById('result-img').src = imageUrl;
                document.getElementById('success-msg').classList.remove('hidden');

            } catch (error) {
                alert(error.message);
            } finally {
                // Reset button state
                btn.disabled = false;
                btn.textContent = 'Execute Generation';
            }
        }
    </script>
</body>

</html>
